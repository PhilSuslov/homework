syntax = "proto3";

package common.v1;

option go_package = "github.com/PhilSuslov/homework/shared/pkg/proto/common/v1;common_v1";

// Сессия кэша в Redis
message User {
  string user_uuid = 1; // UUID пользователя
  string login = 2; // Логин пользователя
  string password = 3; // Пароль пользователя
  string email = 4; // Email пользователя
  repeated NotificationMethods notification_methods = 5; // Список каналов уведомлений пользователя
}

// Каналы уведомления пользователя
message NotificationMethods {
  optional string provider_name = 1; // Имя провайдера (например, telegram, email, push)
  optional string target = 2; // Адрес получателя — email, ID чата и т.д.
}

// Запрос на получение юзера
message GetUserRequest {
  string user_uuid = 1; // UUID пользователя
}

// Ответ на получение пользователя
message GetUserResponser {
  common.v1.User user = 1;
}

//Запрос на регистрацию пользователя
message RegisterRequest {
  common.v1.User user = 1;
}

//Ответ на регистрацию пользователя
message RegisterResponser {
  string uuid = 1;
}

service UserService {
  rpc Register(RegisterRequest) returns (RegisterResponser);
  rpc GetUser(GetUserRequest) returns (GetUserResponser);
}
