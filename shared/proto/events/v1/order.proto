syntax = "proto3";

package events.v1;

option go_package = "github.com/PhilSuslov/homework/shared/pkg/proto/events/v1;events_v1";

// Сервис заказов отвечает за управление заказами на постройку кораблей. Он хранит заказы в собственной базе данных (PostgreSQL) и взаимодействует с InventoryService для расчета финальной стоимости заказа, а также с PaymentService для проведения оплаты
message OrderRecorded {
  string event_uuid = 1; // Уникальный идентификатор события (для идемпотентности)
  string order_uuid = 2; // Идентификатор оплаченного заказа
  string user_uuid = 3; // Идентификатор пользователя
  string payment_method =4; // Способ оплаты (строкой, значение из PaymentMethod)
  string transaction_uuid =5; // 	Идентификатор транзакции, сгенерированный в результате оплаты
}

//Сервис сборки кораблей отвечает за выполнение заказов после их оплаты. Работает в фоновом режиме — без внешнего API. Получает событие OrderPaid из Kafka и имитирует выполнение сборки. После сборки публикует событие ShipAssembled
message ShipAssembled {
  string event_uuid = 1; // Уникальный идентификатор события (для идемпотентности)
  string order_uuid = 2; // Идентификатор собранного заказа
  string user_uuid = 3; // Идентификатор пользователя
  int64 build_time_sec = 4; // Время (в секундах), потраченное на сборку корабля
}

